<!DOCTYPE html>
<html lang="en" data-platform="macos">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Keypad Login</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="https://cdn.skypack.dev/tweakpane@4.0.4"></script>
    <style>
      body {
        margin: 0;
        display: grid;
        place-items: center;
        height: 100vh;
        background: #0b0c10;
        color: white;
        font-family: sans-serif;
      }
      .status-box {
        margin-top: 2rem;
        font-size: 1.2rem;
        min-height: 1.5em;
      }
      .password-box {
        font-size: 2rem;
        margin-bottom: 2rem;
        letter-spacing: 0.5rem;
        background: #1f2833;
        padding: 1rem 2rem;
        border-radius: 10px;
        border: 2px solid #45a29e;
        color: #66fcf1;
      }
    </style>
  </head>
  <body>
    <div class="password-box" id="passwordDisplay">____</div>
    <main>
      <div class="keypad">
        <div class="keypad__base">
          <img
            src="https://assets.codepen.io/605876/ai-base.png?format=auto&quality=86"
            alt=""
          />
        </div>
        <button id="one" class="key keypad__single" data-digit="1">1</button>
        <button id="two" class="key keypad__single" data-digit="2">2</button>
        <button id="three" class="key keypad__single" data-digit="3">3</button>
        <button id="four" class="key keypad__single" data-digit="4">4</button>
        <button id="five" class="key keypad__single" data-digit="5">5</button>
      </div>
    </main>
    <div class="status-box" id="status"></div>
    <script>
      const password = '1234';
      let input = '';
      const display = document.getElementById('passwordDisplay');
      const status = document.getElementById('status');

      document.querySelectorAll('.keypad__single').forEach((btn) => {
        btn.addEventListener('click', () => {
          const digit = btn.getAttribute('data-digit');
          if (!digit) return;
          if (input.length < 4) {
            input += digit;
            display.textContent = input.padEnd(4, '_');
          }

          if (input.length === 4) {
            if (input === password) {
              status.textContent = '✓ Access Granted';
              status.style.color = 'lime';
            } else {
              status.textContent = '✗ Incorrect';
              status.style.color = 'red';
              setTimeout(() => {
                input = '';
                display.textContent = '____';
                status.textContent = '';
              }, 1500);
            }
          }
        });
      });
    </script>
  </body>
</html>
