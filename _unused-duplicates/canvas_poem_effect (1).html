<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>תשמור על העולם ילד</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #001f3f, #0074D9);
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<canvas id='oldSkool'></canvas>
<script>
  const db = document.body;
  const c = document.getElementById('oldSkool');
  const $ = c.getContext('2d');
  c.width = window.innerWidth;
  c.height = window.innerHeight;

  const lines = [
    "תשמור על העולם ילד יש דברים שאסור לראות 😢",
    "תשמור על העולם ילד אם תראה תפסיק להיות גיבור 😢",
    "גיבור של העולם ילד עם חיוך של מלאכים",
    "תשמור על העולם ילד כי אנחנו כבר לא מצליחים",
    "אל תגזים במחשבות כי כמה שתדע יותר 😢",
    "ובשעה מסוימת נסגרות כל הדלתות",
    "וכל האהבה נגמרת, רק אתה ממשיך לתהות"
  ];

  let x = 0;
  let y = 0;

  function draw() {
    $.fillStyle = "rgba(0,0,0,0.3)";
    $.fillRect(0, 0, c.width, c.height);

    $.font = "24px 'Courier New', monospace";
    $.shadowColor = "#00ffcc";
    $.shadowBlur = 10;
    $.fillStyle = "#ffffff";
    $.textBaseline = "top";

    for (let i = 0; i <= y; i++) {
      let line = lines[i];
      if (i === y) {
        line = line.substring(0, x);
      }
      $.fillText(line, 100, 60 + i * 40);
    }

    x++;
    if (x > lines[y].length) {
      x = 0;
      y++;
    }

    if (y < lines.length) {
      requestAnimationFrame(draw);
    }
  }

  draw();
</script>
</body>
</html>
